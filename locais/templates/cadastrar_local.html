<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar local</title>
</head>
<body>

<form method="post">
    {% csrf_token %}
  <fieldset>
    <legend>Cadastro de Local de Descarte</legend>
    
    <table style="width: 100%; border-spacing: 10px; font-family: sans-serif;">
      <tr>
        <td style="width: 15%;"><label for="nome">Nome do Local:</label></td>
        <td colspan="3">
          <input type="text" id="nome" name="nome" style="width: 100%;" required>
        </td>
      </tr>

      <tr>
        <td><label for="cep">CEP:</label></td>
        <td><input type="text" id="cep" name="cep" placeholder="00000-000" style="width: 100%;"></td>
        <td style="width: 15%;"><label for="id_cidade">Cidade:</label></td>
        <td>
          <select id="id_cidade" name="id_cidade" style="width: 100%;">
            <option value="">Selecione a cidade...</option>
            {% for cidade in cidade %}
              <option value="{{ cidade.id_cidade }}">{{ cidade.nome }}</option>
            {% endfor %}
          </select>
        </td>
      </tr>

      <tr>
        <td><label for="logradouro">Logradouro:</label></td>
        <td colspan="3"><input type="text" id="logradouro" name="logradouro" style="width: 100%;"></td>
      </tr>

      <tr>
        <td><label for="numero">Número:</label></td>
        <td><input type="text" id="numero" name="numero" style="width: 100%;"></td>
        <td><label for="complemento">Complemento:</label></td>
        <td><input type="text" id="complemento" name="complemento" style="width: 100%;"></td>
      </tr>

      <tr>
        <td><label for="bairro">Bairro:</label></td>
        <td colspan="3"><input type="text" id="bairro" name="bairro" style="width: 100%;"></td>
      </tr>

      <tr>
        <td><label for="latitude">Latitude:</label></td>
        <td><input type="number" id="latitude" name="latitude" step="any" style="width: 100%;"></td>
        <td><label for="longitude">Longitude:</label></td>
        <td><input type="number" id="longitude" name="longitude" step="any" style="width: 100%;"></td>
      </tr>

      <tr>
        <td><label for="telefone">Telefone:</label></td>
        <td><input type="tel" id="telefone" name="telefone" placeholder="(00) 0000-0000" style="width: 100%;"></td>
        <td><label for="site">Site/URL:</label></td>
        <td><input type="url" id="site" name="site" placeholder="https://..." style="width: 100%;"></td>
      </tr>

      <tr>
        <td><label for="horario">Horário:</label></td>
        <td colspan="3">
          <input type="text" id="horario" name="horario" placeholder="Ex: Seg a Sex das 08:00 às 18:00" style="width: 100%;">
        </td>
      </tr>

      <tr>
        <td colspan="4" style="text-align: right; padding-top: 20px;">
          <input type="reset" value="Limpar" style="padding: 10px 20px; margin-right: 10px;">
          <button type="submit" style="padding: 10px 30px; background-color: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Cadastrar
          </button>
        </td>
      </tr>
    </table>
  </fieldset>
</form>

</body>

</html>
